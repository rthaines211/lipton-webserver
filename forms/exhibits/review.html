<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duplicate Review — Exhibit Collector</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="review-styles.css">
</head>
<body>

<div class="form-container">
    <!-- Header (matches main exhibit page shell) -->
    <div class="form-header">
        <div class="header-text">
            <h1>Duplicate Review</h1>
            <p class="subtitle" id="review-subtitle">Loading...</p>
        </div>
    </div>

    <!-- Actions Bar -->
    <div class="form-section review-actions-bar">
        <div class="review-header-actions">
            <button class="btn-remove-all" id="btn-remove-all"><i class="fas fa-trash-alt"></i> Remove All Duplicates</button>
            <button class="btn-continue" id="btn-continue-top">Continue to Processing &rarr;</button>
        </div>
    </div>

    <!-- Tab Bar -->
    <div class="review-tabs" id="review-tabs"></div>

    <!-- Tab Content -->
    <div class="form-section review-content-section">
        <div class="review-content" id="review-content"></div>
    </div>

    <!-- Loading State -->
    <div class="review-loading" id="review-loading">
        <i class="fas fa-spinner fa-spin"></i>
        <p>Loading duplicate data...</p>
    </div>
</div>

<!-- Sticky Footer -->
<div class="review-footer">
    <div class="review-footer-stats" id="review-footer-stats"></div>
    <button class="btn-continue" id="btn-continue-bottom">Continue to Processing &rarr;</button>
</div>

<!-- Confirmation Dialog -->
<div class="confirm-overlay" id="confirm-overlay" style="display: none;">
    <div class="confirm-dialog">
        <h2 class="confirm-title"><i class="fas fa-exclamation-triangle" style="color: var(--warning-color);"></i> Confirm & Process</h2>
        <div class="confirm-stats" id="confirm-stats"></div>
        <div class="confirm-warning">
            <i class="fas fa-info-circle"></i>
            <div>
                <p class="confirm-warning-title">Removed files will not be included in the generated exhibits.</p>
                <p class="confirm-warning-detail">This cannot be undone — you would need to re-upload to include them again.</p>
            </div>
        </div>
        <div class="confirm-actions">
            <button class="btn-secondary" id="btn-go-back"><i class="fas fa-arrow-left"></i> Go Back</button>
            <button class="btn-continue" id="btn-confirm-process">Process Files &rarr;</button>
        </div>
    </div>
</div>

<script src="js/review-ui.js"></script>
</body>
</html>
