# =============================================================================
# Deploy Exhibit Collector — Cloud Run
# =============================================================================
#
# Deploys the exhibit-collector service to Cloud Run on push to main
# for exhibit-relevant paths, or on manual dispatch.
#
# Service: exhibit-collector
# Domain:  exhibits.liptonlegal.com (mapped separately after first deploy)
# =============================================================================

name: Deploy Exhibit Collector

on:
  push:
    branches:
      - main
    paths:
      - 'forms/exhibits/**'
      - 'routes/exhibits.js'
      - 'routes/dropbox.js'
      - 'routes/jobs.js'
      - 'services/exhibit-processor.js'
      - 'services/duplicate-detector.js'
      - 'services/pdf-page-builder.js'
      - 'services/dropbox-browser.js'
      - 'services/async-job-manager.js'
      - 'dropbox-service.js'
      - 'job-entrypoint.js'
      - 'middleware/**'
      - 'monitoring/instrument.js'
      - 'server.js'
      - 'package*.json'
      - 'Dockerfile'
      - 'config/production.env'
      - '.github/workflows/deploy-exhibit-collector.yml'

  workflow_dispatch:

concurrency:
  group: deploy-exhibit-collector
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: docmosis-tornado
  GCP_REGION: us-central1
  SERVICE_NAME: exhibit-collector
  SERVICE_ACCOUNT: 945419684329-compute@developer.gserviceaccount.com

jobs:
  deploy:
    name: 🚀 Deploy Exhibit Collector
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://exhibits.liptonlegal.com

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: ☁️ Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: 📋 Load environment configuration
        id: load-config
        run: |
          set -euo pipefail
          ENV_VARS=$(grep -v '^#' config/production.env \
            | grep -v '^$' \
            | grep -v '^PORT=' \
            | tr '\n' ',' \
            | sed 's/,$//')
          echo "env_vars=$ENV_VARS" >> $GITHUB_OUTPUT
          VAR_COUNT=$(echo "$ENV_VARS" | tr ',' '\n' | grep -c '.' || true)
          echo "📊 Loaded $VAR_COUNT environment variables"

      - name: 🚀 Deploy to Cloud Run
        run: |
          set -euo pipefail
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --source=. \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --platform=managed \
            --allow-unauthenticated \
            --update-secrets="DB_PASSWORD=DB_PASSWORD:latest,ACCESS_TOKEN=ACCESS_TOKEN:latest,SENDGRID_API_KEY=sendgrid-api-key:latest,DROPBOX_ACCESS_TOKEN=dropbox-token:latest,DROPBOX_APP_KEY=dropbox-app-key:latest,DROPBOX_APP_SECRET=dropbox-app-secret:latest,DROPBOX_REFRESH_TOKEN=dropbox-refresh-token:latest,DOCMOSIS_ACCESS_KEY=docmosis-key:latest,SENTRY_DSN=SENTRY_DSN:latest" \
            --set-env-vars="${{ steps.load-config.outputs.env_vars }}" \
            --service-account=${{ env.SERVICE_ACCOUNT }} \
            --add-cloudsql-instances="${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:legal-forms-db" \
            --memory=4Gi \
            --cpu=4 \
            --concurrency=2 \
            --timeout=900 \
            --max-instances=10 \
            --min-instances=1 \
            --session-affinity

          echo "✅ Deployed ${{ env.SERVICE_NAME }}"

      - name: ✅ Verify deployment
        run: |
          set -euo pipefail
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --format='value(status.url)')
          echo "✅ Service URL: $URL"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health" || echo "000")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Health check failed (HTTP $HTTP_STATUS)"
            exit 1
          fi
          echo "✅ Health check passed (HTTP $HTTP_STATUS)"

      - name: 🔄 Deploy Cloud Run Job
        run: |
          set -euo pipefail
          IMAGE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --format='value(spec.template.spec.containers[0].image)')

          gcloud run jobs create exhibit-processor-job \
            --image="$IMAGE_URL" \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --memory=8Gi \
            --cpu=8 \
            --task-timeout=3600 \
            --max-retries=0 \
            --command="node" \
            --args="--require,@sentry/node/preload,job-entrypoint.js" \
            --set-env-vars="${{ steps.load-config.outputs.env_vars }}" \
            --set-secrets="DB_PASSWORD=DB_PASSWORD:latest,SENDGRID_API_KEY=sendgrid-api-key:latest,DROPBOX_ACCESS_TOKEN=dropbox-token:latest,DROPBOX_APP_KEY=dropbox-app-key:latest,DROPBOX_APP_SECRET=dropbox-app-secret:latest,DROPBOX_REFRESH_TOKEN=dropbox-refresh-token:latest,SENTRY_DSN=SENTRY_DSN:latest" \
            --service-account=${{ env.SERVICE_ACCOUNT }} \
            --add-cloudsql-instances="${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:legal-forms-db" \
            2>/dev/null || \
          gcloud run jobs update exhibit-processor-job \
            --image="$IMAGE_URL" \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --memory=8Gi \
            --cpu=8 \
            --task-timeout=3600 \
            --max-retries=0 \
            --command="node" \
            --args="--require,@sentry/node/preload,job-entrypoint.js" \
            --set-env-vars="${{ steps.load-config.outputs.env_vars }}" \
            --set-secrets="DB_PASSWORD=DB_PASSWORD:latest,SENDGRID_API_KEY=sendgrid-api-key:latest,DROPBOX_ACCESS_TOKEN=dropbox-token:latest,DROPBOX_APP_KEY=dropbox-app-key:latest,DROPBOX_APP_SECRET=dropbox-app-secret:latest,DROPBOX_REFRESH_TOKEN=dropbox-refresh-token:latest,SENTRY_DSN=SENTRY_DSN:latest" \
            --service-account=${{ env.SERVICE_ACCOUNT }} \
            --add-cloudsql-instances="${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:legal-forms-db"

          echo "✅ Cloud Run Job deployed/updated"
